<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>教师管理端</title>
    <script src="https://cdn.staticfile.net/vue/3.3.4/vue.global.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; --border: #e2e8f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #334155; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .header h1 { font-size: 20px; color: var(--primary); margin: 0; }
        .btn-logout { color: #ef4444; cursor: pointer; border: 1px solid #fee2e2; background: #fef2f2; padding: 5px 15px; border-radius: 6px; font-size: 12px; }

        /* 栅格布局 */
        .main-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; flex: 1; min-height: 0; }
        
        /* 卡片通用样式 */
        .card { background: white; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .card-header { padding: 15px 20px; border-bottom: 1px solid var(--border); background: #f8fafc; font-weight: bold; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 20px; overflow-y: auto; flex: 1; }

        /* 左侧：维护区 */
        .upload-section { display: flex; flex-direction: column; gap: 20px; }
        
        /* 上传框样式修复 */
        .upload-box { 
            display: block; /* 关键：设为块级元素 */
            border: 2px dashed #cbd5e1; 
            border-radius: 8px; 
            padding: 30px 20px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.2s; 
            background: #f8fafc;
        }
        .upload-box:hover { border-color: var(--accent); background: #eff6ff; }
        .upload-icon { font-size: 32px; margin-bottom: 10px; display: block; }
        .upload-text { font-weight: bold; color: #475569; display: block; margin-bottom: 5px; }
        .upload-sub { font-size: 12px; color: #94a3b8; display: block; }

        .btn-primary { width: 100%; background: var(--primary); color: white; padding: 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

        /* 右侧：表格 */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 12px 15px; border-bottom: 2px solid var(--border); color: #64748b; background: #f8fafc; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        tr:hover { background: #f8fafc; }
        
        .score-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .score-high { background: #dcfce7; color: #166534; }
        .score-mid { background: #fef9c3; color: #854d0e; }
        .score-low { background: #fee2e2; color: #991b1b; }

        .msg { margin-top: 15px; padding: 10px; border-radius: 6px; font-size: 12px; text-align: center; }
        .msg-success { background: #dcfce7; color: #166534; }
        .msg-error { background: #fee2e2; color: #991b1b; }
        
        .refresh-btn { color: var(--accent); cursor: pointer; border: none; background: none; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>👨‍🏫 教师管理控制台</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 12px; color: #64748b;">管理员: {{ user.username }}</span>
                <button class="btn-logout" @click="logout">退出</button>
            </div>
        </div>

        <div class="main-grid">
            <!-- 左侧：维护 -->
            <div class="card">
                <div class="card-header">📚 知识库维护</div>
                <div class="card-body upload-section">
                    
                    <!-- 上传按钮 -->
                    <label class="upload-box">
                        <span class="upload-icon">📄</span>
                        <span class="upload-text">点击上传教材</span>
                        <span class="upload-sub">支持 PDF / TXT</span>
                        <input type="file" @change="upload" hidden accept=".pdf,.txt">
                    </label>

                    <!-- 重建按钮 -->
                    <div>
                        <p style="font-size: 12px; color: #64748b; margin-bottom: 10px;">⚠️ 上传新文档后，请务必重建索引。</p>
                        <button class="btn-primary" @click="reindex" :disabled="reindexing">
                            {{ reindexing ? '正在重建...' : '🔄 重建向量索引' }}
                        </button>
                    </div>

                    <div v-if="msg" :class="['msg', msgType === 'success' ? 'msg-success' : 'msg-error']">
                        {{ msg }}
                    </div>
                </div>
            </div>

            <!-- 右侧：数据 -->
            <div class="card">
                <div class="card-header">
                    <span>📊 学情数据监控</span>
                    <button class="refresh-btn" @click="loadData">刷新数据 ↻</button>
                </div>
                
                <div class="card-body" style="padding: 0;">
                    <table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>学生</th>
                                <th>题目</th>
                                <th style="text-align:right">得分</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="record in records" :key="record.id">
                                <td style="color:#94a3b8; font-family:monospace; font-size: 12px;">{{ record.time }}</td>
                                <td style="font-weight:bold">{{ record.student }}</td>
                                <td style="color:#475569; max-width: 250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">{{ record.question }}</td>
                                <td style="text-align:right">
                                    <span :class="['score-badge', record.score >= 80 ? 'score-high' : record.score >= 60 ? 'score-mid' : 'score-low']">
                                        {{ record.score }}
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div v-if="!records.length" style="text-align:center; padding: 40px; color: #94a3b8;">暂无数据</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_BASE = 'http://127.0.0.1:8088';

        createApp({
            setup() {
                const user = ref({});
                const records = ref([]);
                const msg = ref('');
                const msgType = ref('');
                const reindexing = ref(false);

                onMounted(() => {
                    const stored = localStorage.getItem('user_info');
                    if (!stored) window.location.href = '/static/login.html';
                    user.value = JSON.parse(stored);
                    if (user.value.role !== 'teacher' && user.value.role !== 'admin') {
                        alert('权限不足');
                        window.location.href = '/static/student/index.html';
                    }
                    loadData();
                });

                const loadData = async () => {
                    try {
                        const res = await fetch(`${API_BASE}/teacher/dashboard_stats`);
                        const data = await res.json();
                        if (data.status === 'success') records.value = data.data;
                    } catch(e) {}
                };

                const upload = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const formData = new FormData();
                    formData.append('file', file);
                    showMsg('正在上传...', 'info');
                    try {
                        const res = await fetch(`${API_BASE}/teacher/upload_doc`, {method: 'POST', body: formData});
                        const data = await res.json();
                        showMsg(data.message, data.status === 'success' ? 'success' : 'error');
                    } catch(e) { showMsg('网络错误', 'error'); }
                };

                const reindex = async () => {
                    if(!confirm('确定重建索引吗？')) return;
                    reindexing.value = true;
                    try {
                        const res = await fetch(`${API_BASE}/teacher/reindex_kb`, {method: 'POST'});
                        showMsg('重建任务已启动', 'success');
                    } catch(e) { showMsg('请求失败', 'error'); } 
                    finally { reindexing.value = false; }
                };

                const showMsg = (text, type) => {
                    msg.value = text;
                    msgType.value = type;
                    setTimeout(() => msg.value = '', 3000);
                };

                const logout = () => {
                    localStorage.removeItem('user_info');
                    window.location.href = '/static/login.html';
                };

                return { user, records, msg, msgType, reindexing, upload, reindex, loadData, logout };
            }
        }).mount('#app');
    </script>
</body>
</html>
